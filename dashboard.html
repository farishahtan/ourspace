<!DOCTYPE html>

<body>

 <button id="musicToggleBtn" onclick="toggleDashboardMusic()" style="position: fixed; top: 20px; right: 20px; z-index: 100000; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,183,197,0.3); color: #ffb7c5; padding: 10px 15px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; backdrop-filter: blur(8px);">🎵 Music: Off</button>

    <canvas id="loveRainCanvas"></canvas>

<div class="video-bg-container">

           id="bgVideo"

           clear="true"
           onended="this.play()" 
           style="background: #0c0014;">
        <source src="VIDEO/BG.MOV" type="video/mp4">

</div>

    <div class="content-overlay central-align">

        <header class="dashboard-header">
            <h1>Happy 1st Anniversary ❤️</h1>
            <p id="anniversaryCounter" class="counter">Loading our timeline...</p>
            
            <div class="logout-container">
                <a href="#" class="logout-btn" onclick="openLogoutModal(event)">
                    <span>Logout 🔒</span>
                </a>
            </div>
        </header> <nav class="dashboard-menu">
            <a href="pictures.html" class="menu-btn">
                <span class="btn-icon">📸</span>

            <div class="modal-buttons">
