<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logging Out...</title>
</head>
<body>
    <script>
        // 1. Instantly wipe out any saved session data
        localStorage.clear();
        sessionStorage.clear();

        // 2. Immediately bounce back to the login screen
        window.location.href = "index.html";
    </script>
</body>
</html>
